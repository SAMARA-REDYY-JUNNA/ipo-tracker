<!DOCTYPE html>
<html>
<head>
<title>IPO Tracker</title>
<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
}

table{
margin:auto;
border-collapse:collapse;
width:60%;
}

th,td{
padding:10px;
border:1px solid #ccc;
}

th{
background:#333;
color:white;
}

</style>
</head>

<body>

<h1>📈 IPO Tracker Dashboard</h1>

<table>

<tr>
<th>IPO Name</th>
</tr>

{% for ipo in ipos %}

<tr>
<td>{{ ipo }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
